name: Custom

# An input whose declared type is not one of R6's five. R11 renders it as free text labelled
# unrecognised rather than blocking the Dispatch: an unknown type is the Workflow author's
# business, not a reason to make the Workflow undispatchable.

on:
  workflow_dispatch:
    inputs:
      colour:
        description: "Pick a colour"
        type: rainbow
        default: teal

jobs:
  paint:
    runs-on: ubuntu-latest
    steps:
      - run: echo paint
