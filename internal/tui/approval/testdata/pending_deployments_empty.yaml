---
version: 2
# A completed Run awaits nothing, so pending_deployments serves an empty array (approvals R12's
# resolved open question: it returns [] on a completed Run rather than something ambiguous). No
# live request is issued: this is replayed in ModeReplayOnly.
interactions:
    - id: 0
      request:
        method: GET
        url: https://api.github.com/repos/o/r/actions/runs/999/pending_deployments
      response:
        status: 200 OK
        code: 200
        body: '[]'
        headers:
            Content-Type: ["application/json; charset=utf-8"]
