---
version: 2
# The cache-usage endpoint answers 403 for a fine-grained PAT that exposes no scopes. The
# view records this as an outcome and continues the fan-out rather than treating it as a fault
# (storage-reclamation R21).
interactions:
    - id: 0
      request:
        method: GET
        url: https://api.github.com/repos/o/r/actions/cache/usage
      response:
        status: 403 Forbidden
        code: 403
        body: '{"message":"Resource not accessible by personal access token","documentation_url":"https://docs.github.com/rest/actions/cache#get-github-actions-cache-usage-for-a-repository"}'
        headers:
            Content-Type: ["application/json; charset=utf-8"]
            X-Ratelimit-Remaining: ["4990"]
