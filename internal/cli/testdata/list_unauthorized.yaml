---
version: 2
interactions:
    # A listing request answered with 401. go-gh turns any non-2xx into an
    # *api.HTTPError carrying the status code, which the command's error classifier
    # maps to exit 4 (cli-surface R17, AC14).
    - id: 0
      request:
        method: GET
        url: https://api.github.com/repos/octo/hello/actions/runs?per_page=20
      response:
        status: 401 Unauthorized
        code: 401
        body: '{"message":"Bad credentials","documentation_url":"https://docs.github.com/rest"}'
        headers:
            Content-Type:
                - application/json; charset=utf-8
