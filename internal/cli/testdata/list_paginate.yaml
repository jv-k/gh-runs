---
version: 2
interactions:
    # -w 9001 filters by workflow ID, which filter.Query does not push, so it is a
    # client-side Match over the whole listing. Page one holds three Runs, only two
    # of workflow 9001, so the command follows the Link header's rel="next" to fill
    # the requested limit rather than stopping one match short (cli-surface R23,
    # ADR-0016).
    - id: 0
      request:
        method: GET
        url: https://api.github.com/repos/octo/hello/actions/runs?per_page=3
      response:
        status: 200 OK
        code: 200
        body: '{"total_count":5,"workflow_runs":[{"id":1,"status":"completed","conclusion":"success","name":"CI","workflow_id":9001,"display_title":"one","event":"push","head_branch":"main","created_at":"2026-07-20T05:00:00Z"},{"id":2,"status":"completed","conclusion":"success","name":"Deploy","workflow_id":9999,"display_title":"two","event":"push","head_branch":"main","created_at":"2026-07-20T04:00:00Z"},{"id":3,"status":"completed","conclusion":"success","name":"CI","workflow_id":9001,"display_title":"three","event":"push","head_branch":"main","created_at":"2026-07-20T03:00:00Z"}]}'
        headers:
            Content-Type:
                - application/json; charset=utf-8
            Etag:
                - '"paginate-p1-v1"'
            Link:
                - '<https://api.github.com/repos/octo/hello/actions/runs?per_page=3&page=2>; rel="next"'
            X-Ratelimit-Remaining:
                - "4940"
    - id: 1
      request:
        method: GET
        url: https://api.github.com/repos/octo/hello/actions/runs?per_page=3&page=2
      response:
        status: 200 OK
        code: 200
        body: '{"total_count":5,"workflow_runs":[{"id":4,"status":"completed","conclusion":"success","name":"CI","workflow_id":9001,"display_title":"four","event":"push","head_branch":"main","created_at":"2026-07-20T02:00:00Z"},{"id":5,"status":"completed","conclusion":"success","name":"Deploy","workflow_id":9999,"display_title":"five","event":"push","head_branch":"main","created_at":"2026-07-20T01:00:00Z"}]}'
        headers:
            Content-Type:
                - application/json; charset=utf-8
            Etag:
                - '"paginate-p2-v1"'
            X-Ratelimit-Remaining:
                - "4939"
