---
version: 2
interactions:
    # --created 2026-07-20 pushes created=2026-07-20 to the server (filter.Query)
    # and applies the same clause client-side (filter.Match). The response carries
    # a Run from the day before, which a bare date's whole-day range excludes, so a
    # green test proves the client-side Match runs rather than the server having
    # filtered alone (cli-surface R6, ADR-0016).
    - id: 0
      request:
        method: GET
        url: https://api.github.com/repos/octo/hello/actions/runs?created=2026-07-20&per_page=20
      response:
        status: 200 OK
        code: 200
        body: '{"total_count":2,"workflow_runs":[{"id":401,"status":"completed","conclusion":"success","name":"CI","display_title":"on the day","event":"push","head_branch":"main","created_at":"2026-07-20T10:00:00Z"},{"id":402,"status":"completed","conclusion":"success","name":"CI","display_title":"day before","event":"push","head_branch":"main","created_at":"2026-07-19T23:59:59Z"}]}'
        headers:
            Content-Type:
                - application/json; charset=utf-8
            Etag:
                - '"octo-hello-created-v1"'
            X-Ratelimit-Remaining:
                - "4960"
