---
version: 2
interactions:
    # -s failure pushes status=failure server-side (the one API parameter that
    # matches either field), then the client-side Match keeps only Runs whose
    # Conclusion is failure. The response deliberately carries a success Run the
    # server would not have returned for a stricter filter, so a green test proves
    # Match filters it out rather than the server having done all the work
    # (cli-surface R4, AC3, ADR-0016).
    - id: 0
      request:
        method: GET
        url: https://api.github.com/repos/octo/hello/actions/runs?per_page=20&status=failure
      response:
        status: 200 OK
        code: 200
        body: '{"total_count":2,"workflow_runs":[{"id":201,"status":"completed","conclusion":"failure","name":"CI","display_title":"Broken run","event":"push","head_branch":"main","created_at":"2026-07-20T10:00:00Z"},{"id":202,"status":"completed","conclusion":"success","name":"CI","display_title":"Green run","event":"push","head_branch":"main","created_at":"2026-07-20T09:00:00Z"}]}'
        headers:
            Content-Type:
                - application/json; charset=utf-8
            Etag:
                - '"octo-hello-failure-v1"'
            X-Ratelimit-Remaining:
                - "4998"
    # -s in_progress pushes status=in_progress and returns a Run still running,
    # whose Conclusion is null. It proves -s spans the Status field too (AC3).
    - id: 1
      request:
        method: GET
        url: https://api.github.com/repos/octo/hello/actions/runs?per_page=20&status=in_progress
      response:
        status: 200 OK
        code: 200
        body: '{"total_count":1,"workflow_runs":[{"id":203,"status":"in_progress","conclusion":null,"name":"CI","display_title":"Running now","event":"push","head_branch":"main","created_at":"2026-07-21T10:00:00Z"}]}'
        headers:
            Content-Type:
                - application/json; charset=utf-8
            Etag:
                - '"octo-hello-inprogress-v1"'
            X-Ratelimit-Remaining:
                - "4997"
