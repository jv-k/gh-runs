      request:
        method: GET
        url: https://api.github.com/repos/acme/alpha/actions/runs?per_page=20
      response:
        status: 200 OK
        code: 200
        body: '{"total_count":2,"workflow_runs":[{"id":1,"status":"completed","conclusion":"success","name":"CI","display_title":"alpha newer","event":"push","head_branch":"main","created_at":"2026-07-20T10:00:00Z"},{"id":2,"status":"completed","conclusion":"success","name":"CI","display_title":"alpha older","event":"push","head_branch":"main","created_at":"2026-07-17T10:00:00Z"}]}'
        headers:
            Content-Type:
                - application/json; charset=utf-8
            Etag:
                - '"alpha-v1"'
            X-Ratelimit-Remaining:
                - "4980"
    - id: 1
