        proto_major: 1
        proto_minor: 1
        content_length: 0
        host: api.github.com
        headers: {}
        url: https://api.github.com/repos/o/r/actions/runs/1
        method: DELETE
      response:
        proto: HTTP/1.1
        proto_major: 1
        proto_minor: 1
        content_length: 0
        body: ""
        headers:
            X-Ratelimit-Remaining:
                - "4890"
            X-Ratelimit-Reset:
                - "1800003600"
        status: 204 No Content
        code: 204
