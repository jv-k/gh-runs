---
version: 2
# A fork-PR Run approval the account is not entitled to make (approvals R14, R11's resolved
# open question). The 403 is an expected outcome discovered by acting, not a fault: the tool
# surfaces it as the not-a-designated-reviewer outcome and issues no retry. No live approve
# is issued: this is replayed in ModeReplayOnly.
interactions:
    - id: 0
      request:
        method: POST
        url: https://api.github.com/repos/o/r/actions/runs/123/approve
      response:
        status: 403 Forbidden
        code: 403
        body: '{"message":"You do not have permission to approve this workflow run."}'
        headers:
            Content-Type: ["application/json; charset=utf-8"]
            X-Ratelimit-Remaining: ["4900"]
            X-Ratelimit-Reset: ["1789000000"]
