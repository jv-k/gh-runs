version: 2
# Two authorization 403s, then a clean 204, then two more 403s. With the breaker threshold at
# 3 the middle success resets the consecutive counter, so the streak reaches only 2 either side
# and the Purge never breaks: all five DELETEs are attempted (purge R21, AC13's "one success
# resets"). Four failures are recorded and one deletion.
interactions:
