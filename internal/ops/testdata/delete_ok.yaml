---
version: 2
# Eight clean DELETEs, one per Run id 1 through 8, each 204 No Content. Used where the
# property under test is not the response (single-use, the write-only log, the only-DELETE
# proof, cancellation), so every attempt succeeds and the test reads the counter and the log.
interactions:
    - id: 0
      request:
        method: DELETE
        url: https://api.github.com/repos/o/r/actions/runs/1
      response:
        status: 204 No Content
        code: 204
        body: ""
