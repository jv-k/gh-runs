---
version: 2
# Three re-runs, each answering 404. For a re-run a 404 is a failure (the Run cannot gain
# an Attempt), so three consecutive at a breaker threshold of 3 circuit-break the operation
# (run-lifecycle R21, R22). No fourth interaction is taped, so a fourth request would fail
# the replay, which is how the test proves the fourth Run was never attempted.
interactions:
    - id: 0
      request:
        method: POST
        url: https://api.github.com/repos/o/r/actions/runs/1/rerun
      response:
        status: 404 Not Found
        code: 404
        body: '{"message":"Not Found","documentation_url":"https://docs.github.com/rest"}'
        headers:
            Content-Type: ["application/json; charset=utf-8"]
            X-Ratelimit-Remaining: ["4900"]
    - id: 1
      request:
        method: POST
        url: https://api.github.com/repos/o/r/actions/runs/2/rerun
      response:
        status: 404 Not Found
        code: 404
        body: '{"message":"Not Found","documentation_url":"https://docs.github.com/rest"}'
        headers:
            Content-Type: ["application/json; charset=utf-8"]
            X-Ratelimit-Remaining: ["4899"]
    - id: 2
      request:
        method: POST
        url: https://api.github.com/repos/o/r/actions/runs/3/rerun
      response:
        status: 404 Not Found
        code: 404
        body: '{"message":"Not Found","documentation_url":"https://docs.github.com/rest"}'
        headers:
            Content-Type: ["application/json; charset=utf-8"]
            X-Ratelimit-Remaining: ["4898"]
