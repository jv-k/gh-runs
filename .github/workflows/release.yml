name: Release

# Cross-compiles the extension and publishes the binaries to a GitHub release on a v2-or-later tag.
#
# cli/gh-extension-precompile is the supported path, not goreleaser. gh picks a release asset
# with HasSuffix(name, "{GOOS}-{GOARCH}"), plus ".exe" on Windows. This action writes its
# binaries to dist/{goos}-{goarch}, which matches. Goreleaser's stock naming title-cases the
# OS and joins with underscores, so it never matches, and it ships a release that looks
# complete and installs nowhere. See docs/adr/0002-go-gh-with-dual-distribution.md.
#
# Prerelease needs no configuration here. The action marks the release as a prerelease when
# the tag contains a hyphen, so v2.0.0-alpha.0 is a prerelease and v2.0.0 is stable. That is
# the semver prerelease rule, and it is what keeps the alpha safe: gh extension install
# resolves an unpinned install through repos/{owner}/{repo}/releases/latest, which skips
# prereleases. Testers opt in with:
#
#   gh extension install jv-k/gh-runs --pin v2.0.0-alpha.0
#
# The action has no prerelease input, so the tag name is the only control. A tag without a
# hyphen publishes as stable and becomes the default install for everyone.

on:
  push:
    tags:
      # v2 and later only. The v1 tags predate the Go rewrite, so re-pushing one would build a
      # tree with no Go in it. Two patterns because a range matches one character: the first
      # covers v2 through v9, the second covers v10 and up.
      - "v[2-9]*"
      - "v[1-9][0-9]*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cli/gh-extension-precompile@v2.2.0
        with:
          # One Go version for CI and for the shipped binaries.
          go_version_file: go.mod
