name: Writing style

# De-slop gate. Runs deslopper (github.com/jv-k/deslopper) over the repo's Markdown and fails
# the build on an error-tier tell (em dashes, the section sign, middle dots). Warn-tier findings
# (word lists, bold bullet leads) annotate the PR but don't block.
#
# The version is pinned in .deslopper-version, which .claude/hooks/deslop-lint.sh reads too, so
# Claude's per-edit lint and this gate cannot drift apart. Bump it there, once.
#
# Run it locally with:
#   uvx --from "git+https://github.com/jv-k/deslopper@$(cat .deslopper-version)" deslopper lint

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.markdown"
      # A PR that loosens the gate must run the gate.
      - "deslopper.config.json"
      - ".deslopper-version"
      - ".github/workflows/writing-style.yml"
  # A direct push to main never opens a PR, so without this the gate is bypassed.
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "**/*.markdown"
      - "deslopper.config.json"
      - ".deslopper-version"
      - ".github/workflows/writing-style.yml"

permissions:
  contents: read

jobs:
  lint:
    name: De-slop lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Run deslopper
        run: |
          pin="$(tr -d '[:space:]' < .deslopper-version)"
          uvx --from "git+https://github.com/jv-k/deslopper@${pin}" deslopper lint --format github
